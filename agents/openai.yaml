interface:
  display_name: "Design Anchor"
  short_description: "Designer-led UI generation and token governance"
  default_prompt: "Use $design-anchor as a designer-led UI governance skill: classify the project and request, then proactively recommend the next best design action, scope, and dependency posture instead of waiting for the user to name commands. Full runtime/component support targets React + Tailwind web apps such as Next.js, Vite React, Remix, and React Router; for other stacks, ask before installing and use design/token guidance by default. For real UI/theme/token/component/governance implementation in a full-fit stack, establish the Design Anchor token baseline first with runtime install/sync when missing: root design-tokens.json plus generated token CSS under .anchor. The skill itself should add no consumer-project files; any new project content must come only from minimal design-anchor runtime commands. Generate or govern UI with beauty as a delivery requirement: token compliance is not done if the page looks flat, generic, or template-like. Generate a polished first page from detailed or matched style prompts, or if the project is already mature, offer layout restructuring as the default governance mode (with progressive optimization and read-only audit as alternatives). Keep UI work governed by root design-tokens.json, @design or @/components imports, local .anchor specs/rules, layout quality principles, sync, optional govern bridges, MCP, and audit. Default to zero new dependencies beyond the token baseline: reuse existing accessible project components and install the smallest Design Anchor primitive only for real UI work that needs missing high-risk interaction behavior. Treat external blocks/effects as reference-only unless the user intent and dependency budget justify installing them. Covers all product types: B2B, SaaS, AI tools, creative tools, developer tools."
